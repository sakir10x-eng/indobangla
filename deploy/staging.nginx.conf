# Staging edge — identical to edge.nginx.conf, but the upstreams are named sapi/sshop/sadmin.
#
# The names matter. Compose always publishes a service's *name* as a network alias, and the
# staging web container has to sit on live's network for Traefik to reach it. If staging's
# services were also called api/shop/admin, `api` would resolve to two containers and each
# side would randomly serve the other's data. It did, on the live site. Distinct names are
# what make sharing the Traefik network safe.
server {
    listen 80;
    server_name staging.indobangla.tech _;
    client_max_body_size 64M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /backend/ {
        set $up http://sapi:80;
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass $up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
    location = /backend { return 301 /backend/; }

    location /admin {
        set $adm http://sadmin:3002;
        proxy_pass $adm$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }

    location / {
        set $shp http://sshop:3000;
        proxy_pass $shp$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
}
