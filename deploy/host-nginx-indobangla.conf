# Host nginx -> the IndoBangla containers.
#
# This box is NOT ours alone: lcghs.edu.bd is live on it behind this same nginx. So the
# containers never touch :80/:443 — they publish on loopback and nginx proxies in.
#
#   live    -> 127.0.0.1:8080  (container nginx routes / , /admin , /backend)
#   staging -> 127.0.0.1:8081
#
# TLS is added by certbot once the domain actually points here:
#   certbot --nginx -d indobangla.tech -d www.indobangla.tech

server {
    listen 80;
    listen [::]:80;
    server_name indobangla.tech www.indobangla.tech;
    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The app builds absolute https URLs; without this it would emit http:// links.
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name staging.indobangla.tech;
    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
}
