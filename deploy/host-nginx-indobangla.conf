# Host nginx -> IndoBangla containers.
#
# indobangla.bd is now the primary domain. indobangla.tech redirects page visits to it,
# but keeps /backend alive, because the shop bundle still has SITE_URL=indobangla.tech
# baked in — so .bd pages call https://indobangla.tech/backend under the hood. Redirecting
# /backend too would break every API call. When the shop is eventually rebuilt with
# SITE_URL=https://indobangla.bd, the /backend exception here can go.
#
# The redirect is 302, not 301: .bd's DNS runs on BTCL and has been flaky (the slave server
# still serves an empty zone). A 302 is not cached hard, so if .bd fails we drop this block
# and .tech is instantly a full site again.
#
# lcghs.edu.bd is unaffected — it has its own server blocks and its own cert.

# ---- primary: indobangla.bd — serves the app ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name indobangla.bd www.indobangla.bd;
    ssl_certificate     /etc/letsencrypt/live/indobangla.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/indobangla.tech/privkey.pem;
    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
}

# ---- indobangla.tech — /backend stays, pages redirect to .bd ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name indobangla.tech www.indobangla.tech;
    ssl_certificate     /etc/letsencrypt/live/indobangla.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/indobangla.tech/privkey.pem;
    client_max_body_size 64M;

    # The baked API endpoint — must keep answering for .bd pages.
    location /backend/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
    location = /backend { proxy_pass http://127.0.0.1:8080; }

    # Everything a human loads goes to .bd.
    location / {
        return 302 https://indobangla.bd$request_uri;
    }
}

# ---- http -> https for both domains ----
server {
    listen 80;
    listen [::]:80;
    server_name indobangla.tech www.indobangla.tech indobangla.bd www.indobangla.bd;
    return 301 https://$host$request_uri;
}

# ---- staging.indobangla.tech — the test site, served over HTTPS from :8081 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name staging.indobangla.tech;
    ssl_certificate     /etc/letsencrypt/live/indobangla.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/indobangla.tech/privkey.pem;
    client_max_body_size 64M;
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
}
server {
    listen 80;
    listen [::]:80;
    server_name staging.indobangla.tech;
    return 301 https://staging.indobangla.tech$request_uri;
}
