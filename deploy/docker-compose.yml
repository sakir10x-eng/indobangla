# This box also hosts lcghs.edu.bd (host nginx + php-fpm + mysql). Without limits a
# Next.js build can eat the RAM and the kernel OOM-killer picks a victim — which has
# no reason to be one of ours. Every service is capped so we cannot starve the
# neighbours. Budget is ~4 GB of the box's 7.9 GB.
name: indobangla

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    mem_limit: 1200m
    oom_score_adj: 600
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks: [ib]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    oom_score_adj: 600
    networks: [ib]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: indobangla-api
    restart: unless-stopped
    mem_limit: 640m
    oom_score_adj: 600
    env_file: [ .env.api ]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_storage:/app/storage
    networks: [ib]

  shop:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.shop
      # Next fetches from https://indobangla.tech/backend DURING the build. That hostname
      # still resolves to the OLD box for many resolvers, so without this the build quietly
      # bakes the old server's data — including image URLs we have already fixed here — into
      # the bundle. Pin it to this box.
      extra_hosts:
        - "indobangla.tech:187.127.122.242"
        - "www.indobangla.tech:187.127.122.242"
      args:
        # Kept out of the image definition — see deploy/README.md.
        SECRET: ${NEXTAUTH_SECRET}
    image: indobangla-shop
    # Google social login (NextAuth) reads these at runtime. Redirect URI registered in
    # Google console: https://indobangla.bd/api/auth/callback/google
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://indobangla.bd
    restart: unless-stopped
    mem_limit: 900m
    oom_score_adj: 600
    networks: [ib]

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
      extra_hosts:
        - "indobangla.tech:187.127.122.242"
        - "www.indobangla.tech:187.127.122.242"
    image: indobangla-admin
    restart: unless-stopped
    mem_limit: 900m
    oom_score_adj: 600
    networks: [ib]

  web:
    image: nginx:alpine
    restart: unless-stopped
    mem_limit: 64m
    oom_score_adj: 600
    volumes:
      - ./edge.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Loopback only. The host's nginx is the real edge here — this box already serves
    # lcghs.edu.bd, so nothing of ours may take :80/:443.
    ports:
      - "127.0.0.1:8080:80"
    networks: [ib]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=indobangla_net"
      - "traefik.http.routers.indobangla.entrypoints=websecure"
      - "traefik.http.routers.indobangla.rule=Host(`indobangla.tech`) || Host(`www.indobangla.tech`)"
      - "traefik.http.routers.indobangla.tls.certresolver=letsencrypt"
      - "traefik.http.services.indobangla.loadbalancer.server.port=80"

networks:
  ib:
    name: indobangla_net

volumes:
  db_data:
  api_storage:
