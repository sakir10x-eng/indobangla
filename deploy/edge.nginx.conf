server {
    listen 80;
    server_name indobangla.tech www.indobangla.tech _;
    client_max_body_size 64M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Laravel API under /backend  (strip prefix -> Laravel sees root routes)
    location /backend/ {
        set $up http://api:80;
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass $up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
    location = /backend { return 301 /backend/; }

    # Admin dashboard (Next.js basePath /admin)
    location /admin {
        set $adm http://admin:3002;
        proxy_pass $adm$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }

    # Storefront (Next.js) - catch all
    location / {
        set $shp http://shop:3000;
        proxy_pass $shp$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
    }
}
